services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: credit_ratings
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d credit_ratings"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
    environment:
      DATABASE_URL: postgresql://admin:secret@postgres:5432/credit_ratings
      DATA_DIR: /app/data
      LOG_LEVEL: INFO

volumes:
  pg_data:
